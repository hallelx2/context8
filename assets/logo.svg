<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a2e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#a855f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c084fc;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="inner" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#22d3ee;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="800" rx="80" fill="url(#bg)"/>

  <!-- Outer glow ring -->
  <circle cx="400" cy="340" r="220" fill="none" stroke="url(#ring)" stroke-width="3" opacity="0.3" filter="url(#glow)"/>

  <!-- Main brain/memory icon — stylized as interconnected nodes -->
  <!-- Central octagon shape -->
  <path d="M400 160 L480 200 L520 280 L520 400 L480 480 L400 520 L320 480 L280 400 L280 280 L320 200 Z"
        fill="none" stroke="url(#ring)" stroke-width="4" opacity="0.6"/>

  <!-- Three vector space nodes — representing problem/solution/code -->
  <!-- Node 1: Problem (top) -->
  <circle cx="400" cy="220" r="45" fill="url(#inner)" opacity="0.9" filter="url(#softglow)"/>
  <text x="400" y="228" text-anchor="middle" fill="white" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="600">P</text>

  <!-- Node 2: Solution (bottom-left) -->
  <circle cx="310" cy="420" r="45" fill="url(#inner)" opacity="0.9" filter="url(#softglow)"/>
  <text x="310" y="428" text-anchor="middle" fill="white" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="600">S</text>

  <!-- Node 3: Code (bottom-right) -->
  <circle cx="490" cy="420" r="45" fill="url(#inner)" opacity="0.9" filter="url(#softglow)"/>
  <text x="490" y="428" text-anchor="middle" fill="white" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="600">C</text>

  <!-- Connections between nodes (representing fusion) -->
  <line x1="400" y1="265" x2="310" y2="375" stroke="url(#accent)" stroke-width="2.5" opacity="0.7"/>
  <line x1="400" y1="265" x2="490" y2="375" stroke="url(#accent)" stroke-width="2.5" opacity="0.7"/>
  <line x1="355" y1="420" x2="445" y2="420" stroke="url(#accent)" stroke-width="2.5" opacity="0.7"/>

  <!-- Center fusion point -->
  <circle cx="400" cy="350" r="18" fill="url(#accent)" opacity="0.9" filter="url(#glow)"/>
  <circle cx="400" cy="350" r="8" fill="white" opacity="0.95"/>

  <!-- Small orbiting dots — representing search/retrieval -->
  <circle cx="540" cy="280" r="6" fill="#c084fc" opacity="0.8"/>
  <circle cx="260" cy="300" r="5" fill="#22d3ee" opacity="0.7"/>
  <circle cx="520" cy="460" r="5" fill="#a855f7" opacity="0.6"/>
  <circle cx="300" cy="500" r="4" fill="#06b6d4" opacity="0.5"/>
  <circle cx="460" cy="180" r="4" fill="#c084fc" opacity="0.6"/>
  <circle cx="340" cy="170" r="5" fill="#22d3ee" opacity="0.5"/>

  <!-- The "8" — main typography -->
  <text x="400" y="640" text-anchor="middle" fill="white" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="120" font-weight="800" letter-spacing="-4">
    Context<tspan fill="url(#accent)">8</tspan>
  </text>

  <!-- Subtitle -->
  <text x="400" y="690" text-anchor="middle" fill="#a1a1aa" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="24" font-weight="400" letter-spacing="4">
    AGENT MEMORY
  </text>

  <!-- Thin accent line under subtitle -->
  <line x1="310" y1="710" x2="490" y2="710" stroke="url(#accent)" stroke-width="2" opacity="0.5"/>
</svg>
